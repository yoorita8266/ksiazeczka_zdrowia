{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kartoteka Medyczna{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'medical_record/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'medical_record/css/all.min.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-success">
        <div class="container">
            <a class="navbar-brand" href="{% url 'child_list' %}">
                <i class="fas fa-heartbeat"></i> Książeczka zdrowia dziecka
            </a>
            <div class="ms-auto">
                {% if request.user.is_authenticated %}
                    <span class="navbar-text me-3 text-white">
                        <i class="fas fa-user"></i> {{ request.user.username }}
                    </span>
                    <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Wyloguj
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-light btn-sm">
                        <i class="fas fa-sign-in-alt"></i> Zaloguj
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="{% static 'medical_record/js/bootstrap.bundle.min.js' %}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const alerts = document.querySelectorAll('.alert');
            
            alerts.forEach(function(alert) {
                setTimeout(function() {
                    alert.style.transition = "opacity 0.6s ease-out";
                    alert.style.opacity = "0";

                    setTimeout(function() {
                        alert.remove();
                    }, 600);
                }, 4000);
            });
        });
    </script>

</body>
</html>
