{% extends 'medical_record/base.html' %}

{% block title %}Dodaj dziecko{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-plus-circle"></i> Dodaj dziecko</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Imię dziecka</label>
                        <input type="text" name="name" class="form-control" placeholder="Wpisz imię dziecka" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data urodzenia</label>
                        <input type="date" name="birth_date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Grupa krwi</label>
                        <input type="text" name="blood_group" class="form-control" placeholder="np. A+, B-, 0+">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'child_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Wróć
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Zapisz
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
