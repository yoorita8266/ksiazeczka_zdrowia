{% extends 'medical_record/base.html' %}

{% block title %}Edytuj dziecko - {{ child.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edytuj dziecko - {{ child.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Imię dziecka</label>
                        <input type="text" name="name" class="form-control" value="{{ child.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data urodzenia</label>
                        <input type="date" name="birth_date" class="form-control" value="{{ child.birth_date }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Grupa krwi</label>
                        <input type="text" name="blood_group" class="form-control" value="{{ child.blood_group }}" placeholder="np. A+, B-, 0+">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'child_detail' child.pk %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Wróć
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Zapisz zmiany
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
