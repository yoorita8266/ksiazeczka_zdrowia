{% extends 'medical_record/base.html' %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5 shadow-sm border-success">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Logowanie</h4>
            </div>
            <div class="card-body">
                
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Podano nieprawidłowy login lub hasło.
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <div class="input-group">
                            <input type="password" name="password" id="id_password" class="form-control" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-3">
                        <i class="fas fa-sign-in-alt"></i> Zaloguj
                    </button>
                </form>

                <hr>
                <p class="text-center mb-0">Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const togglePasswordBtn = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#id_password');
        const toggleIcon = document.querySelector('#toggleIcon');

        togglePasswordBtn.addEventListener('click', function () {
            const currentType = passwordInput.getAttribute('type');
            const newType = currentType === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', newType);

            if (newType === 'text') {
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });
    });
</script>
{% endblock %}
